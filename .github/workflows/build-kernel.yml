name: Build Huawei Kirin710 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64
      DEFCONFIG: merge_kirin710_defconfig
      CCACHE_DIR: ~/.ccache
      USE_CCACHE: 1

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install packages
        run: |
          sudo apt update

           sudo apt install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            python3 \
            unzip \
            zip \
            cpio

      # - name: Setup AOSP GCC 4.9
      #   run: |
      #     mkdir -p $HOME/toolchains
      #     cd $HOME/toolchains

      #     git clone \
      #       https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
      #       gcc49

      #     cd gcc49
      #     git checkout android-9.0.0_r61

      #     echo "$HOME/toolchains/gcc49/bin" >> $GITHUB_PATH

      - name: Prepare toolchain directory
        run: mkdir -p $HOME/toolchains/gcc49

      - name: Cache AOSP GCC 4.9 Toolchain
        uses: actions/cache@v4
        with:
          path: $HOME/toolchains/gcc49
          key: gcc49-aarch64-android-9.0.0_r61
          restore-keys: |
            gcc49-aarch64-

      - name: Setup AOSP GCC 4.9
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains

          if [ ! -f gcc49/bin/aarch64-linux-android-gcc ]; then
            rm -rf gcc49
            git clone \
              https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
              gcc49

            cd gcc49
            git checkout android-9.0.0_r61
          else
            echo "Using cached toolchain"
          fi

          echo "$HOME/toolchains/gcc49/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache -M 5G
          ccache -s

      - name: Clean source
        run: |
          rm -rf include/config || true
          mkdir -p out

      - name: Add KernelSU v0.9.5
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v0.9.5

          echo
          echo "KernelSU v0.9.5 added successfully"

      - name: Configure kernel
        run: |
          make ARCH=arm64 \
               O=out \
               CROSS_COMPILE=aarch64-linux-android- \
               $DEFCONFIG

      - name: Build kernel
        run: |
          make -j$(nproc) \
               ARCH=arm64 \
               O=out \
               CROSS_COMPILE="ccache aarch64-linux-android-" \
               2>&1 | tee build.log

      - name: Package Kernel Images
        run: |
          set -e

          END_TIME=$(date +%Y.%m.%d-%H_%M)

          echo "Packing kernel images..."

          # Ensure mkbootimg exists
          chmod +x tools/mkbootimg || true

          # Enforcing build
          tools/mkbootimg \
            --kernel out/arch/arm64/boot/Image.gz \
            --base 0x0 \
            --cmdline "loglevel=4 initcall_debug=n page_tracker=on unmovable_isolate1=2:192M,3:224M,4:256M printktimer=0xfff0a000,0x534,0x538 androidboot.selinux=enforcing buildvariant=user" \
            --tags_offset 0x07A00000 \
            --kernel_offset 0x00080000 \
            --ramdisk_offset 0x07c00000 \
            --header_version 1 \
            --os_version 9 \
            --os_patch_level 2019-05-05 \
            --output Kirin710_EMUI9.1-${END_TIME}.img

          # Permissive build
          tools/mkbootimg \
            --kernel out/arch/arm64/boot/Image.gz \
            --base 0x0 \
            --cmdline "loglevel=4 initcall_debug=n page_tracker=on unmovable_isolate1=2:192M,3:224M,4:256M printktimer=0xfff0a000,0x534,0x538 androidboot.selinux=permissive buildvariant=user" \
            --tags_offset 0x07A00000 \
            --kernel_offset 0x00080000 \
            --ramdisk_offset 0x07c00000 \
            --header_version 1 \
            --os_version 9 \
            --os_patch_level 2019-05-05 \
            --output Kirin710_EMUI9.1_PM-${END_TIME}.img

          echo "Done packaging kernel images."

      - name: Show generated artifacts
        run: |
          echo "==== Generated boot artifacts ===="
          find out/arch/arm64/boot -type f

          echo
          echo "==== File info ===="
          file out/arch/arm64/boot/* || true

          echo
          echo "==== Sizes ===="
          ls -lah out/arch/arm64/boot/

      - name: Show ccache stats
        run: ccache -s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kirin710-kernel-build
          path: |
            out/arch/arm64/boot/**
            build.log
            Kirin710_EMUI9.1-*.img
            Kirin710_EMUI9.1_PM-*.img
